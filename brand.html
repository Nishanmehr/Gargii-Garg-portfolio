<!DOCTYPE html>
<html>
<head>
  <title>Branding Work</title>

  <style>
    body {
      background: black;
      color: white;
      font-family: sans-serif;
      padding: 40px;
    }

    h1 {
      margin-bottom: 30px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .gallery img {
      width: 100%;
      border-radius: 10px;
      transition: transform 0.3s;
      cursor: pointer;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<h1>Branding Projects</h1>

<div class="gallery">
  <img src="images/brands/br1.png">
  <img src="images/brands/br2.png">
  <img src="images/brands/br3.png">
  <img src="images/brands/br4.png">
  <img src="images/brands/br5.png">
  <img src="images/brands/br6.png">
  <img src="images/brands/br7.png">
  <img src="images/brands/br8.png">
  <img src="images/brands/br9.png">
  <img src="images/brands/br10.png">
  <img src="images/brands/br11.png">
  <img src="images/brands/br12.png">
  <img src="images/brands/br13.png">
  <img src="images/brands/br14.png">
  <img src="images/brands/br15.png">
  <img src="images/brands/br16.png">
  <img src="images/brands/br17.png">
  <img src="images/brands/br18.png">
  <img src="images/brands/br19.png">
</div>
<script>
const images = document.querySelectorAll('.gallery img');

images.forEach(img => {
  img.addEventListener('click', () => {

    // create overlay
    const overlay = document.createElement('div');
    overlay.style.position = 'fixed';
    overlay.style.top = 0;
    overlay.style.left = 0;
    overlay.style.width = '100%';
    overlay.style.height = '100%';
    overlay.style.background = 'rgba(0,0,0,0.9)';
    overlay.style.display = 'flex';
    overlay.style.alignItems = 'center';
    overlay.style.justifyContent = 'center';
    overlay.style.zIndex = 9999;

    // create big image
    const bigImg = document.createElement('img');
    bigImg.src = img.src;
    bigImg.style.maxWidth = '90%';
    bigImg.style.maxHeight = '90%';
    bigImg.style.borderRadius = '10px';

    overlay.appendChild(bigImg);

    // close on click
    overlay.addEventListener('click', () => {
      overlay.remove();
    });

    document.body.appendChild(overlay);
  });
});
</script>
</body>
</html>
